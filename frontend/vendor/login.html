<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --black: #0a0a0a;
            --white: #f5f5f0;
            --mid: #888;
            --border: rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Left Panel ── */
        .panel-left {
            width: 48%;
            background: var(--black);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px 52px;
            overflow: hidden;
        }

        /* Geometric grid overlay */
        .panel-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 48px 48px;
            }
        }

        /* Large decorative numeral */
        .panel-left::after {
            content: 'V';
            font-family: 'Bebas Neue', sans-serif;
            font-size: 520px;
            line-height: 1;
            color: rgba(255, 255, 255, 0.04);
            position: absolute;
            right: -60px;
            bottom: -60px;
            pointer-events: none;
            letter-spacing: -0.05em;
        }

        .brand {
            position: relative;
            z-index: 2;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            border: 2px solid var(--white);
            border-radius: 6px;
            display: grid;
            place-items: center;
        }

        .brand-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: var(--white);
            stroke-width: 2;
        }

        .brand-name {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--white);
        }

        .panel-left-body {
            position: relative;
            z-index: 2;
        }

        .tagline {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(52px, 5.5vw, 80px);
            line-height: 0.95;
            color: var(--white);
            letter-spacing: 0.01em;
            margin-bottom: 28px;
        }

        .tagline span {
            display: block;
            color: rgba(255, 255, 255, 0.3);
        }

        .panel-desc {
            font-size: 14px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.7;
            max-width: 300px;
        }

        .stats-row {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 40px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {}

        .stat-num {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            color: var(--white);
            letter-spacing: 0.03em;
        }

        .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-top: 2px;
        }

        /* ── Right Panel ── */
        .panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 80px;
            background: var(--white);
            position: relative;
        }

        /* subtle noise texture */
        .panel-right::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            margin-bottom: 44px;
        }

        .login-eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--mid);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-eyebrow::before {
            content: '';
            display: block;
            width: 20px;
            height: 1px;
            background: var(--mid);
        }

        .login-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            letter-spacing: 0.02em;
            color: var(--black);
            line-height: 1;
        }

        /* Error */
        .error-message {
            display: none;
            background: var(--black);
            color: var(--white);
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 24px;
            letter-spacing: 0.04em;
            animation: shake 0.4s ease;
        }

        .error-message.visible {
            display: block;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-6px);
            }

            40%,
            80% {
                transform: translateX(6px);
            }
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--mid);
            margin-bottom: 8px;
            font-family: 'DM Mono', monospace;
        }

        .input-wrap {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 400;
            background: transparent;
            border: 1.5px solid rgba(0, 0, 0, 0.18);
            border-radius: 6px;
            color: var(--black);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
        }

        .form-input::placeholder {
            color: rgba(0, 0, 0, 0.25);
        }

        .form-input:focus {
            border-color: var(--black);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.07);
        }

        /* Password toggle */
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--mid);
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .toggle-pw:hover {
            color: var(--black);
        }

        .toggle-pw svg {
            width: 18px;
            height: 18px;
        }

        /* Extras row */
        .form-extras {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            margin-top: -4px;
        }

        .remember-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            user-select: none;
        }

        .remember-label input[type="checkbox"] {
            display: none;
        }

        .custom-check {
            width: 16px;
            height: 16px;
            border: 1.5px solid rgba(0, 0, 0, 0.25);
            border-radius: 3px;
            display: grid;
            place-items: center;
            transition: background 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }

        .remember-label input:checked~.custom-check {
            background: var(--black);
            border-color: var(--black);
        }

        .custom-check svg {
            width: 9px;
            height: 9px;
            stroke: white;
            stroke-width: 2.5;
            display: none;
        }

        .remember-label input:checked~.custom-check svg {
            display: block;
        }

        .forgot-link {
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            color: var(--mid);
            text-decoration: none;
            letter-spacing: 0.06em;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--black);
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--black);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }

        .btn-submit:hover::after {
            background: rgba(255, 255, 255, 0.06);
        }

        .btn-submit:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn-submit.loading .btn-text {
            opacity: 0;
        }

        .btn-submit.loading .btn-spinner {
            display: block;
        }

        .btn-text {
            transition: opacity 0.2s;
        }

        .btn-spinner {
            display: none;
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .btn-submit.loading .btn-spinner {
            display: flex;
        }

        .spinner-ring {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(0, 0, 0, 0.1);
        }

        .divider-text {
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            color: rgba(0, 0, 0, 0.3);
            letter-spacing: 0.1em;
        }

        /* SSO button */
        .btn-sso {
            width: 100%;
            padding: 13px 16px;
            background: transparent;
            border: 1.5px solid rgba(0, 0, 0, 0.18);
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: border-color 0.2s, background 0.2s;
            letter-spacing: 0.02em;
        }

        .btn-sso:hover {
            border-color: var(--black);
            background: rgba(0, 0, 0, 0.03);
        }

        .btn-sso svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* Footer */
        .login-footer {
            margin-top: 40px;
            text-align: center;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            color: rgba(0, 0, 0, 0.3);
            letter-spacing: 0.08em;
        }

        /* Responsive */
        @media (max-width: 860px) {
            .panel-left {
                display: none;
            }

            .panel-right {
                padding: 48px 32px;
            }
        }
    </style>
</head>

<body>

    <!-- Left Decorative Panel -->
    <div class="panel-left">
        <div class="brand">
            <div class="brand-mark">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                </div>
                <span class="brand-name">Linko</span>
            </div>
        </div>

        <div class="panel-left-body">
            <h2 class="tagline">
                Vendor<br>
                <span>Portal</span><br>
                Access
            </h2>
            <p class="panel-desc">Manage your inventory, orders, and partnerships from a single secure dashboard.</p>
        </div>

        <div class="stats-row" style="visibility: hidden;">
            <div class="stat-item">
                <div class="stat-num">12K+</div>
                <div class="stat-label">Vendors</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">99.9%</div>
                <div class="stat-label">Uptime</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">256b</div>
                <div class="stat-label">Encrypted</div>
            </div>
        </div>
    </div>

    <!-- Right Login Panel -->
    <div class="panel-right">
        <div class="login-box">

            <div class="login-header">
                <div class="login-eyebrow">Vendor Portal</div>
                <h1 class="login-title">Sign In</h1>
            </div>

            <div class="error-message" id="loginError">
                ✕ &nbsp; Invalid credentials. Please try again.
            </div>

            <form id="loginForm" onsubmit="return false" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email</label>
                    <div class="input-wrap">
                        <input type="email" class="form-input" id="loginEmail" value="admin@gmail.com" placeholder="vendor@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <div class="input-wrap">
                        <input type="password" class="form-input" id="loginPassword" value="123456" placeholder="Enter your password" style="padding-right: 44px;" required>
                    </div>
                </div>

                <div class="form-extras">
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">
                    <span class="btn-text" >Access Portal</span>
                    <span class="btn-spinner"><span class="spinner-ring"></span></span>
                </button>
            </form>
        </div>
    </div>

    <script src="../api/login.js"></script>
    <script src="../assets/url.js"></script>
</body>
</html>
