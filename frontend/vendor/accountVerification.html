<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="../assets/alert.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --white: #f8f8f8;
            --gray: #666;
        }

        body {
            background: var(--white);
            font-family: "DM Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Grid */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 0, 0, .04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, .04) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: 0;
        }

        /* Decorative Circle */
        body::after {
            content: "";
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(0, 0, 0, .08), transparent 70%);
            position: absolute;
            right: -150px;
            top: -150px;
            border-radius: 50%;
        }

        .card {
            width: 95%;
            max-width: 500px;
            background: white;
            border: 1px solid rgba(0, 0, 0, .08);
            border-radius: 18px;
            padding: 50px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, .08);
            position: relative;
            z-index: 2;
            animation: fade .6s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: "DM Mono", monospace;
            font-size: 13px;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 35px;
        }

        h1 {
            font-family: "Bebas Neue", sans-serif;
            font-size: 64px;
            line-height: 1;
            color: var(--black);
            letter-spacing: 1px;
        }

        p {
            color: var(--gray);
            margin-top: 15px;
            line-height: 1.7;
            font-size: 15px;
        }

        strong {
            color: #000;
        }

        .otp-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 45px 0 35px;
        }

        .otp-input {
            width: 58px;
            height: 64px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            font-size: 28px;
            font-family: "DM Mono", monospace;
            transition: .25s;
            outline: none;
            background: #fafafa;
        }

        .otp-input:focus {
            border-color: #000;
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, .08);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            font-size: 13px;
            color: #777;
        }

        .footer button {
            border: none;
            background: none;
            font-family: "DM Mono", monospace;
            cursor: pointer;
            color: black;
            font-size: 12px;
            letter-spacing: .08em;
        }

        .footer button:hover {
            opacity: .6;
        }

        .verify-btn {
            width: 100%;
            border: none;
            background: black;
            color: white;
            padding: 17px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            letter-spacing: .08em;
            text-transform: uppercase;
            transition: .25s;
        }

        .verify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, .18);
        }

        .back {
            text-align: center;
            margin-top: 28px;
        }

        .back a {
            text-decoration: none;
            color: #666;
            font-size: 13px;
        }

        .back a:hover {
            color: black;
        }

        @media(max-width:600px) {

            .card {
                padding: 35px 22px;
            }

            h1 {
                font-size: 52px;
            }

            .otp-input {
                width: 46px;
                height: 56px;
                font-size: 24px;
            }
        }
    </style>

</head>

<body>

    <div class="card">

        <div class="logo">LINKO.NG</div>

        <h1>VERIFY</h1>

        <p>Enter the 6-digit verification code sent to your email</p>

        <div class="otp-container">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
            <input class="otp-input" maxlength="1">
        </div>

        <div class="footer">
            <span id="timer">02:00</span>
            <button type="button" id="resendBtn" style="display: none;">Resend Code</button>
        </div>

        <button class="verify-btn" onclick="submitBtn()">Verify Account</button>

        <div class="back"><a href="login.html">← Back to Login</a></div>

    </div>

    <div id="alertBox" class="alert">Saved successfully!</div>
    <script src="../assets/alert.js"></script>
    <script src="../assets/url.js"></script>    
    <script>
        const inputs = document.querySelectorAll(".otp-input");
        let email = new URLSearchParams(window.location.search).get('mail') || localStorage.getItem("verificationEmail")

        if (!email) {
            window.location.href = "../404.html"
        }
        inputs.forEach((input, index) => {

            input.addEventListener("input", () => {

                input.value = input.value.replace(/\D/g, "");

                if (input.value && index < inputs.length - 1)
                    inputs[index + 1].focus();

            });

            input.addEventListener("keydown", (e) => {

                if (e.key === "Backspace" && !input.value && index > 0)
                    inputs[index - 1].focus();

            });

            input.addEventListener("paste", (e) => {

                e.preventDefault();

                const data = e.clipboardData.getData("text").replace(/\D/g, "").slice(0, 6);

                data.split("").forEach((num, i) => {

                    if (inputs[i]) inputs[i].value = num;

                });

            });

        });

        async function submitBtn() {

            // Combine all digits into one code
            const otp = [...inputs].map(input => input.value).join("");

            // Check that all 6 digits are entered
            if (otp.length !== 6) {
                showAlert("Please enter the 6-digit verification code.", "error");
                return;
            }

            try {
                const response = await fetch(`${backendUrl}/auth/accountVerification`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify({
                        code: otp,
                        email: email
                    })
                });

                const result = await response.json();

                if (result.status === "error") {
                    showAlert(result.message, result.status)
                    return;
                }

                showAlert(result.message, result.status)
                setTimeout(() => {
                    window.location.href = "login.html"
                }, 1500);
                return;

            } catch (err) {
                showAlert("Network error. Please try again.", "error");
                return;
            }

        }

        // Countdown
        let time = 120;

        const timer = document.getElementById("timer");
        async function resendVerificationMail() {
            try {
                const response = await fetch(`${backendUrl}/auth/resendVerificationMail`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify({email: email})
                });

                const result = await response.json();

                if (result.status === "error") {
                    showAlert(result.message, result.status)
                    return;
                }

                showAlert(result.message, result.status)
                return;

            } catch (err) {
                showAlert("Network error. Please try again.", "error");
                return;
            }
        }

        setInterval(() => {

            if (time <= 0) {
                let resendBtn = document.getElementById("resendBtn")
                timer.innerHTML = "Expired";
                resendBtn.style.display = "block"
                return;
            }

            time--;

            const m = String(Math.floor(time / 60)).padStart(2, "0");
            const s = String(time % 60).padStart(2, "0");

            timer.innerHTML = `${m}:${s}`;

        }, 1000);

        resendBtn.addEventListener("click", function () {
            resendVerificationMail()
            resendBtn.style.display = "none"
            time = 120
            const m = String(Math.floor(time / 60)).padStart(2, "0");
            const s = String(time % 60).padStart(2, "0");

            timer.innerHTML = `${m}:${s}`;
        })
    </script>

</body>

</html>
