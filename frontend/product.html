<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linko — Product Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/alert.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ease: cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 28px;
            position: relative;
            overflow: hidden;
            background: #080808;
        }

        /* ── Blurred background image ── */
        .bg-blur {
            position: fixed;
            inset: -60px;
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.18) saturate(1.8);
            transform: scale(1.12);
            z-index: 0;
            transition: background-image 1s ease;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% 100%, rgba(0,0,0,0.8) 0%, transparent 70%),
                rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* ── Theme switcher — editorial tab style ── */
        .style-picker {
            display: flex;
            gap: 0;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .style-btn {
            padding: 9px 20px;
            border: none;
            border-radius: 5px;
            border-right: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.35);
            font-family: 'Inter', sans-serif;
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .style-btn:last-child { border-right: none; }
        .style-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }
        .style-btn.active { background: #fff; color: #000; }

        /* ── Card wrapper ── */
        #cardTarget {
            position: relative;
            width: 400px;
            height: 560px;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            z-index: 10;
        }

        /* ════════════════════════════════════════
           THEME: DARK (default — editorial black)
        ════════════════════════════════════════ */
        .theme-dark #cardTarget {
            background: #0a0a0a;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.07),
                0 60px 120px rgba(0,0,0,0.9);
        }
        .theme-dark .card-bg-layer {
            background:
                linear-gradient(160deg, rgba(255,255,255,0.03) 0%, transparent 50%),
                radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255,255,255,0.04) 0%, transparent 70%);
        }
        .theme-dark .card-grid {
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        }
        .theme-dark .edition-label { color: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.12); }
        .theme-dark .product-id { color: rgba(255,255,255,0.22); }
        .theme-dark .product-name { color: #fff; }
        .theme-dark .divider-line { background: rgba(255,255,255,0.1); }
        .theme-dark .product-desc { color: rgba(255,255,255,0.45); }
        .theme-dark .price-label { color: rgba(255,255,255,0.3); }
        .theme-dark .price-value { color: #fff; }
        .theme-dark .store-label { color: rgba(255,255,255,0.3); }
        .theme-dark .store-value { color: #fff; }
        .theme-dark .store-dot { background: #25D366; box-shadow: 0 0 8px rgba(37,211,102,0.6); }
        .theme-dark .img-overlay {
            background: linear-gradient(to bottom,
                transparent 30%,
                rgba(10,10,10,0.4) 60%,
                #0a0a0a 100%);
        }
        .theme-dark .card-logo-area { border-color: rgba(255,255,255,0.07); }
        .theme-dark .logo-word { color: rgba(255,255,255,0.35); }
        .theme-dark .logo-tld { color: rgba(255,255,255,0.18); }
        .theme-dark .logo-badge { background: #fff; color: #000; }
        .theme-dark .corner-accent { border-color: rgba(255,255,255,0.15); }

        /* ════════════════════════════════════════
           THEME: BLAZE (burnt amber)
        ════════════════════════════════════════ */
        .theme-blaze #cardTarget {
            background: #0c0700;
            box-shadow:
                0 0 0 1px rgba(255,140,0,0.1),
                0 60px 120px rgba(0,0,0,0.9);
        }
        .theme-blaze .card-bg-layer {
            background:
                linear-gradient(160deg, rgba(255,120,0,0.07) 0%, transparent 55%),
                radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255,80,0,0.08) 0%, transparent 70%);
        }
        .theme-blaze .card-grid {
            background-image:
                linear-gradient(rgba(255,140,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,140,0,0.04) 1px, transparent 1px);
        }
        .theme-blaze .edition-label { color: rgba(255,160,40,0.4); border-color: rgba(255,140,0,0.18); }
        .theme-blaze .product-id { color: rgba(255,160,40,0.3); }
        .theme-blaze .product-name { color: #fff; }
        .theme-blaze .divider-line { background: rgba(255,140,0,0.2); }
        .theme-blaze .product-desc { color: rgba(255,190,100,0.5); }
        .theme-blaze .price-label { color: rgba(255,160,40,0.35); }
        .theme-blaze .price-value { color: #ffb340; }
        .theme-blaze .store-label { color: rgba(255,160,40,0.35); }
        .theme-blaze .store-value { color: rgba(255,210,140,0.9); }
        .theme-blaze .store-dot { background: #ff8c00; box-shadow: 0 0 8px rgba(255,140,0,0.7); }
        .theme-blaze .img-overlay {
            background: linear-gradient(to bottom,
                transparent 30%,
                rgba(12,7,0,0.4) 60%,
                #0c0700 100%);
        }
        .theme-blaze .card-logo-area { border-color: rgba(255,140,0,0.1); }
        .theme-blaze .logo-word { color: rgba(255,160,40,0.4); }
        .theme-blaze .logo-tld { color: rgba(255,140,0,0.2); }
        .theme-blaze .logo-badge { background: #ff8c00; color: #000; }
        .theme-blaze .corner-accent { border-color: rgba(255,140,0,0.2); }

        /* ════════════════════════════════════════
           THEME: NEON (deep violet / cyan)
        ════════════════════════════════════════ */
        .theme-neon #cardTarget {
            background: #03030f;
            box-shadow:
                0 0 0 1px rgba(100,60,255,0.12),
                0 60px 120px rgba(0,0,0,0.9);
        }
        .theme-neon .card-bg-layer {
            background:
                linear-gradient(160deg, rgba(80,40,220,0.1) 0%, transparent 55%),
                radial-gradient(ellipse 80% 50% at 50% 100%, rgba(0,200,255,0.06) 0%, transparent 70%);
        }
        .theme-neon .card-grid {
            background-image:
                linear-gradient(rgba(100,60,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,60,255,0.05) 1px, transparent 1px);
        }
        .theme-neon .edition-label { color: rgba(140,100,255,0.5); border-color: rgba(100,60,255,0.2); }
        .theme-neon .product-id { color: rgba(140,100,255,0.3); }
        .theme-neon .product-name { color: #fff; }
        .theme-neon .divider-line { background: rgba(100,60,255,0.25); }
        .theme-neon .product-desc { color: rgba(180,160,255,0.5); }
        .theme-neon .price-label { color: rgba(140,100,255,0.4); }
        .theme-neon .price-value { color: #b090ff; }
        .theme-neon .store-label { color: rgba(140,100,255,0.4); }
        .theme-neon .store-value { color: rgba(200,180,255,0.9); }
        .theme-neon .store-dot { background: #00dcff; box-shadow: 0 0 8px rgba(0,220,255,0.7); }
        .theme-neon .img-overlay {
            background: linear-gradient(to bottom,
                transparent 30%,
                rgba(3,3,15,0.4) 60%,
                #03030f 100%);
        }
        .theme-neon .card-logo-area { border-color: rgba(100,60,255,0.12); }
        .theme-neon .logo-word { color: rgba(140,100,255,0.45); }
        .theme-neon .logo-tld { color: rgba(100,60,255,0.22); }
        .theme-neon .logo-badge { background: linear-gradient(135deg,#6440ff,#00dcff); color: #fff; }
        .theme-neon .corner-accent { border-color: rgba(100,60,255,0.22); }

        /* ════════════════════════════════════════
           THEME: PEARL (bone white / editorial light)
        ════════════════════════════════════════ */
        .theme-pearl #cardTarget {
            background: #f5f3ee;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.08),
                0 60px 120px rgba(0,0,0,0.4);
        }
        .theme-pearl .card-bg-layer {
            background:
                linear-gradient(160deg, rgba(0,0,0,0.015) 0%, transparent 50%),
                radial-gradient(ellipse 80% 50% at 50% 100%, rgba(0,0,0,0.03) 0%, transparent 70%);
        }
        .theme-pearl .card-grid {
            background-image:
                linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
        }
        .theme-pearl .edition-label { color: rgba(0,0,0,0.28); border-color: rgba(0,0,0,0.1); }
        .theme-pearl .product-id { color: rgba(0,0,0,0.22); }
        .theme-pearl .product-name { color: #111; }
        .theme-pearl .divider-line { background: rgba(0,0,0,0.1); }
        .theme-pearl .product-desc { color: rgba(0,0,0,0.45); }
        .theme-pearl .price-label { color: rgba(0,0,0,0.3); }
        .theme-pearl .price-value { color: #111; }
        .theme-pearl .store-label { color: rgba(0,0,0,0.3); }
        .theme-pearl .store-value { color: #111; }
        .theme-pearl .store-dot { background: #25D366; box-shadow: 0 0 6px rgba(37,211,102,0.5); }
        .theme-pearl .img-overlay {
            background: linear-gradient(to bottom,
                transparent 30%,
                rgba(245,243,238,0.4) 60%,
                #f5f3ee 100%);
        }
        .theme-pearl .card-logo-area { border-color: rgba(0,0,0,0.07); }
        .theme-pearl .logo-word { color: rgba(0,0,0,0.3); }
        .theme-pearl .logo-tld { color: rgba(0,0,0,0.16); }
        .theme-pearl .logo-badge { background: #111; color: #fff; }
        .theme-pearl .corner-accent { border-color: rgba(0,0,0,0.12); }

        /* ════════════════════════════════════════
           CARD INTERNALS — shared across all themes
        ════════════════════════════════════════ */
        .card-bg-layer {
            position: absolute; inset: 0; z-index: 0; pointer-events: none;
        }
        .card-grid {
            position: absolute; inset: 0; z-index: 1;
            pointer-events: none; background-size: 28px 28px;
        }

        /* Full-bleed image — top 55% */
        .card-image-area {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 55%;
            z-index: 2;
            overflow: hidden;
        }
        .card-img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            transition: opacity 0.45s var(--ease);
        }
        .img-overlay {
            position: absolute; inset: 0; z-index: 3;
        }

        /* Corner bracket accents */
        .corner-accent {
            position: absolute;
            width: 18px; height: 18px;
            border: 1.5px solid;
            z-index: 4;
            pointer-events: none;
        }
        .corner-tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
        .corner-tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }

        /* Carousel strip */
        .carousel-strip {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 5px 7px;
            background: rgba(0,0,0,0.55);
            border-radius: 5px;
            max-width: 88%;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .carousel-strip::-webkit-scrollbar { display: none; }
        .carousel-strip:empty, .carousel-strip.single { display: none; }
        .carousel-thumb {
            width: 34px; height: 34px;
            border-radius: 3px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
            border: 1.5px solid transparent;
            opacity: 0.55;
            transition: opacity 0.2s, border-color 0.2s, transform 0.2s;
        }
        .carousel-thumb:hover { opacity: 0.85; transform: translateY(-2px); }
        .carousel-thumb.active { border-color: #fff; opacity: 1; }

        /* ── Card content area ── */
        .card-content {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 5;
            padding: 18px 20px 0;
        }

        /* Edition eyebrow */
        .edition-label {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            border: 1px solid;
            padding: 4px 10px;
            border-radius: 2px;
            margin-bottom: 10px;
        }

        .product-id {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .product-name {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 100;
            letter-spacing: -0.04em;
            line-height: 1.0;
            margin-bottom: 12px;
        }

        .divider-line {
            height: 1px;
            width: 100%;
            margin-bottom: 10px;
        }

        .product-desc {
            font-size: 11.5px;
            font-weight: 300;
            line-height: 1.65;
            margin-bottom: 14px;
            max-width: 92%;
        }

        /* Price + store row */
        .card-row {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .price-block { display: flex; flex-direction: column; gap: 1px; }
        .price-label {
            font-size: 8.5px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .price-value {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 100;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .store-block {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 3px;
        }
        .store-label {
            font-size: 8.5px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .store-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .store-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .store-value {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        /* Logo footer */
        .card-logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-top: 1px solid;
        }
        .logo-badge {
            width: 18px; height: 18px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 10px;
            flex-shrink: 0;
        }
        .logo-word {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .logo-tld {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 400;
        }

        /* ── Screenshot button ── */
        .card-actions {
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 13px 36px;
            border-radius: 3px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.9);
            background: transparent;
            color: #fff;
            transition: background 0.2s, color 0.2s, transform 0.15s;
        }
        .action-btn:hover { background: #fff; color: #000; }
        .action-btn:active { transform: scale(0.97); }
        .action-btn.loading { opacity: 0.5; pointer-events: none; }

        /* ── Flash ── */
        .saving-flash {
            position: fixed; inset: 0;
            background: rgba(255,255,255,0.1);
            z-index: 9999; pointer-events: none;
            opacity: 0; transition: opacity 0.12s;
        }
        .saving-flash.flash { opacity: 1; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 32px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(10,10,10,0.97);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 11px 22px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 9px;
            opacity: 0;
            transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
            z-index: 9999; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast-icon { color: #25D366; font-size: 14px; }

        @media (max-width: 480px) {
            #cardTarget { width: 340px; height: 500px; }
            .product-name { font-size: 22px; }
        }
    </style>
</head>

<body class="theme-dark">

    <div class="bg-blur" id="bgBlur"></div>
    <div class="bg-overlay"></div>
    <div class="saving-flash" id="savingFlash"></div>
    <div class="toast" id="toast"><span class="toast-icon">✓</span><span id="toastMsg">Image saved!</span></div>

    <!-- Theme picker -->
    <div class="style-picker">
        <button class="style-btn active" onclick="setTheme('dark',this)">Noir</button>
        <button class="style-btn" onclick="setTheme('blaze',this)">Blaze</button>
        <button class="style-btn" onclick="setTheme('neon',this)">Neon</button>
        <button class="style-btn" onclick="setTheme('pearl',this)">Pearl</button>
    </div>

    <!-- Card — what gets screenshotted -->
    <div id="cardTarget">
        <div class="card-bg-layer"></div>
        <div class="card-grid"></div>

        <div class="card-image-area">
            <img class="card-img" id="cardImg" src="./assets/images/logo.png" alt="Product image">
            <div class="img-overlay"></div>
            <!-- corner bracket accents -->
            <div class="corner-accent corner-tl"></div>
            <div class="corner-accent corner-tr"></div>
            <!-- Carousel thumbnail strip — populated by buildCarousel() -->
            <div class="carousel-strip" id="carouselStrip"></div>
        </div>

        <div class="card-content">
            <div class="edition-label">
                <span id="edition-label">Linko </span>
            </div>
            <div class="product-id" id="cardId">-</div>
            <div class="product-name" id="cardName"></div>
            <div class="divider-line"></div>
            <div class="product-desc" id="cardDesc"></div>

            <div class="card-row">
                <div class="price-block">
                    <span class="price-label">Price</span>
                    <span class="price-value" id="cardPrice">₦0</span>
                </div>
                <div class="store-block">
                    <span class="store-label">Available at</span>
                    <div class="store-row">
                        <div class="store-dot"></div>
                        <span class="store-value" id="cardStore">—</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-logo-area">
            <div class="logo-badge">L</div>
            <span class="logo-word">linko</span><span class="logo-tld">.ng</span>
        </div>
    </div>

    <!-- Single action -->
    <div class="card-actions">
        <button class="action-btn" id="screenshotBtn" onclick="takeScreenshot()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
            Screenshot
        </button>
    </div>

    <div id="alertBox" class="alert">Saved successfully!</div>
    <script src="./assets/alert.js"></script>
    <script src="./assets/urlParams.js"></script>
    <script src="./assets/url.js"></script>
    <script src="./api/vendor.js"></script>
    <script src="./api/product.js"></script>

    <script>
        // ── Carousel ───────────────────────────────────────────────────
        function buildCarousel(images) {
            const strip = document.getElementById('carouselStrip');
            const mainImg = document.getElementById('cardImg');
            strip.innerHTML = '';

            if (!images || images.length <= 1) {
                strip.classList.add('single');
                return;
            }
            strip.classList.remove('single');

            images.forEach((src, index) => {
                const thumb = document.createElement('img');
                thumb.src = src;
                thumb.alt = 'Product image ' + (index + 1);
                thumb.className = 'carousel-thumb' + (index === 0 ? ' active' : '');

                thumb.addEventListener('click', () => {
                    mainImg.style.opacity = '0';
                    setTimeout(() => {
                        mainImg.src = src;
                        mainImg.style.opacity = '1';
                        syncBackground(src);
                    }, 200);

                    strip.querySelectorAll('.carousel-thumb').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                });

                strip.appendChild(thumb);
            });
        }

        // ── Init ───────────────────────────────────────────────────────
        async function initVendorData() {
            const productId = params.get('pid') || ""
            await getVendorData()
            let getProductDataById = await getProductById(productId)

            document.getElementById('cardId').textContent = getProductDataById._id || '';
            document.getElementById('cardName').textContent = getProductDataById.name || '';
            document.getElementById('cardDesc').textContent = getProductDataById.description || '';
            document.getElementById('cardPrice').textContent = `₦${Number(getProductDataById.price || 0).toLocaleString()}`;
            document.getElementById('cardStore').textContent = JSON.parse(localStorage.getItem('vendorData')).username || '';
            document.getElementById('edition-label').textContent = JSON.parse(localStorage.getItem('vendorData')).brand_name || '';
            document.getElementById('cardImg').src = getProductDataById.images[0] || './assets/images/logo.png';

            buildCarousel(getProductDataById.images);
        }
        initVendorData()

        // ── Set blurred background to match card image ─────────────────
        function syncBackground(src) {
            document.getElementById('bgBlur').style.backgroundImage = `url('${src}')`;
        }

        const initialImg = document.getElementById('cardImg');
        initialImg.addEventListener('load', () => syncBackground(initialImg.src));
        if (initialImg.complete) syncBackground(initialImg.src);

        // ── Theme switcher ─────────────────────────────────────────────
        function setTheme(name, btn) {
            document.body.className = 'theme-' + name;
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // ── Screenshot & download ──────────────────────────────────────
        async function takeScreenshot() {
            const btn = document.getElementById('screenshotBtn');
            btn.classList.add('loading');
            btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Saving…`;

            const flash = document.getElementById('savingFlash');
            flash.classList.add('flash');
            setTimeout(() => flash.classList.remove('flash'), 200);

            try {
                const canvas = await html2canvas(document.getElementById('cardTarget'), {
                    scale: 3,
                    useCORS: true,
                    allowTaint: true,
                    backgroundColor: null,
                    logging: false,
                });

                const link = document.createElement('a');
                const productId = document.getElementById('cardId').textContent.replace(/[^a-z0-9]/gi, '-').toLowerCase();
                link.download = `linko-${productId}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

                showToast('Image downloaded!');
            } catch (err) {
                showToast('Screenshot failed — try again.');
                console.error(err);
            } finally {
                btn.classList.remove('loading');
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Screenshot`;
            }
        }

        // ── Toast ──────────────────────────────────────────────────────
        let toastTimer = null;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>

</html>
